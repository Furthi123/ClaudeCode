<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delcube — Website UI Kit</title>
  <link rel="icon" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [screen, setScreen] = useState(() => localStorage.getItem('dc_screen') || 'home');
      const [product, setProduct] = useState(null);
      const [cart, setCart] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);

      useEffect(() => { localStorage.setItem('dc_screen', screen); window.scrollTo(0, 0); }, [screen]);

      const nav = (to, p) => {
        if (p) setProduct(p);
        setScreen(to);
      };
      const addToCart = (p) => {
        setCart((c) => [...c, p]);
        setCartOpen(true);
      };

      return (
        <>
          <Nav onNav={nav} cartCount={cart.length} onOpenCart={() => setCartOpen(true)} />
          <main data-screen-label={
            screen === 'home' ? '01 Home' :
            screen === 'product' ? '02 Product' : '03 Custom'
          }>
            {screen === 'home' && <HomeScreen onNav={nav} onAdd={addToCart} />}
            {screen === 'product' && <ProductScreen product={product} onNav={nav} onAdd={addToCart} />}
            {screen === 'custom' && <CustomScreen onNav={nav} />}
          </main>
          <Footer />
          <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} items={cart} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
