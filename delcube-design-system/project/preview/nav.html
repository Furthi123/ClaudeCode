<!doctype html>
<html><head><meta charset="utf-8"><title>Nav bar</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-sunken); }
  .wrap { width: 700px; padding: 24px; }
  .nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 64px; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--border-1); border-radius: 16px; padding: 0 20px; box-shadow: 0 4px 12px rgba(10,10,10,0.04); }
  .brand img { height: 22px; display: block; }
  .links { display: flex; gap: 24px; font-size: 14px; font-weight: 500; color: var(--fg-1); justify-content: center; }
  .links a { color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .chev { width: 8px; height: 8px; border-right: 1.5px solid var(--fg-2); border-bottom: 1.5px solid var(--fg-2); transform: rotate(45deg); margin-top: -3px; }
  .icons { display: flex; gap: 8px; color: var(--fg-1); justify-content: flex-end; }
  .icons button { background: transparent; border: 0; padding: 8px; border-radius: 999px; cursor: pointer; display: inline-flex; position: relative; }
  .icons button:hover { background: #F4F4F4; }
  .icons svg { width: 18px; height: 18px; }
  .cart-dot { position: absolute; top: 6px; right: 6px; width: 14px; height: 14px; background: #FFDB00; color: #0A0A0A; font-size: 10px; font-weight: 700; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
</style>
</head><body>
<div class="wrap">
  <div class="nav">
    <div class="brand"><img src="../assets/logo-black.svg" alt="Delcube"></div>
    <div class="links">
      <a href="#">Store <span class="chev"></span></a>
      <a href="#">Custom anfragen</a>
      <a href="#">Community <span class="chev"></span></a>
    </div>
    <div class="icons">
      <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></button>
      <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg></button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7h12l-1.2 11a2 2 0 0 1-2 1.8H9.2a2 2 0 0 1-2-1.8L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>
        <span class="cart-dot">1</span>
      </button>
    </div>
  </div>
</div>
</body></html>
