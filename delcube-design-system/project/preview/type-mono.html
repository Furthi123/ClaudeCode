<!doctype html>
<html><head><meta charset="utf-8"><title>Numerals</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: center; }
  .block { display: flex; flex-direction: column; gap: 10px; }
  .big { font-family: 'DM Sans', sans-serif; font-size: 32px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg-1); font-variant-numeric: tabular-nums; }
  .l { font-size: 11px; font-weight: 600; color: var(--fg-3); letter-spacing: 0.02em; }
  .note { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--fg-2); }
</style>
</head><body>
<div class="card">
  <div class="block">
    <span class="l">EDITION NUMBER</span>
    <div class="big">012 / 050</div>
    <div class="note">DM Sans · 600 · tabular-nums</div>
  </div>
  <div class="block">
    <span class="l">SKU / TECHNICAL</span>
    <div class="big">TB-R-0412</div>
    <div class="note">Same family as body — consistent rhythm</div>
  </div>
</div>
</body></html>
