<!doctype html>
<html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px; }
  .block { display: flex; flex-direction: column; gap: 8px; }
  .t { font-size: 13px; font-weight: 700; color: var(--fg-1); }
  .s { font-family: var(--ff-mono); font-size: 11px; color: var(--fg-3); }
  .demo { height: 54px; background: var(--bg-sunken); border-radius: 10px; display: flex; align-items: center; padding: 0 10px; overflow: hidden; position: relative; }
  .ball { width: 18px; height: 18px; background: #0A0A0A; border-radius: 999px; animation: move 2.4s var(--e, cubic-bezier(0.2,0.8,0.2,1)) infinite; }
  @keyframes move { 0%,20% { transform: translateX(0); } 50% { transform: translateX(calc(100% + 150px)); } 50.01% { transform: translateX(calc(100% + 150px)); } 80%,100% { transform: translateX(0); } }
</style>
</head><body>
<div class="card">
  <div class="block">
    <div class="t">Fast · 120ms</div>
    <div class="demo"><div class="ball" style="animation-duration: 1.8s"></div></div>
    <div class="s">hover · focus ring</div>
  </div>
  <div class="block">
    <div class="t">Default · 180ms</div>
    <div class="demo"><div class="ball" style="animation-duration: 2.2s"></div></div>
    <div class="s">button press · input</div>
  </div>
  <div class="block">
    <div class="t">Slow · 260ms</div>
    <div class="demo"><div class="ball" style="animation-duration: 2.6s"></div></div>
    <div class="s">modal · drawer</div>
  </div>
</div>
</body></html>
