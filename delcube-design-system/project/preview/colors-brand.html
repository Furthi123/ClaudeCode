<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; }
  .strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .swatch { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border-1); }
  .chip { height: 110px; }
  .meta { padding: 12px 14px; background: #fff; }
  .meta .n { font-weight: 600; font-size: 14px; color: var(--fg-1); }
  .meta .hex { font-family: var(--ff-mono); font-size: 12px; color: var(--fg-3); margin-top: 2px; }
</style>
</head><body>
<div class="card">
  <div class="strip">
    <div class="swatch">
      <div class="chip" style="background:#0A0A0A"></div>
      <div class="meta"><div class="n">Black</div><div class="hex">#0A0A0A · --dc-black</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#FFFFFF; box-shadow: inset 0 0 0 1px var(--border-1);"></div>
      <div class="meta"><div class="n">White</div><div class="hex">#FFFFFF · --dc-white</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#FFDB00"></div>
      <div class="meta"><div class="n">Delcube Yellow</div><div class="hex">#FFDB00 · --dc-yellow</div></div>
    </div>
  </div>
</div>
</body></html>
