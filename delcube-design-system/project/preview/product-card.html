<!doctype html>
<html><head><meta charset="utf-8"><title>Product card</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; background: var(--bg-sunken); }
  .grid9 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .p { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 12px rgba(10,10,10,0.06), 0 1px 2px rgba(10,10,10,0.04); }
  .img { aspect-ratio: 1/1; background: #F4F4F4; position: relative; overflow: hidden; }
  .img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img .pin { position: absolute; top: 12px; left: 12px; background: #FFDB00; color: #0A0A0A; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
  .img .pin.dark { background: #0A0A0A; color: #fff; }
  .meta { padding: 14px 16px 16px; }
  .eb { font-size: 11px; font-weight: 600; color: var(--fg-3); }
  .t { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: -0.02em; margin-top: 4px; color: var(--fg-1); }
  .bot { display: flex; align-items: baseline; justify-content: space-between; margin-top: 10px; }
  .price { font-size: 15px; font-weight: 600; color: var(--fg-1); font-variant-numeric: tabular-nums; }
</style>
</head><body>
<div class="card">
  <div class="grid9">
    <div class="p">
      <div class="img">
        <span class="pin">Neu</span>
        <img src="../assets/product-red-bear.webp" alt="">
      </div>
      <div class="meta">
        <div class="eb">Tag Bear</div>
        <div class="t">Red Drip · Standard</div>
        <div class="bot"><span class="price">€ 189,00</span></div>
      </div>
    </div>
    <div class="p">
      <div class="img">
        <span class="pin dark">Limited</span>
        <img src="../assets/product-solo-bear.webp" alt="">
      </div>
      <div class="meta">
        <div class="eb">Tag Bear</div>
        <div class="t">Pop Drip · Black Edition</div>
        <div class="bot"><span class="price">€ 249,00</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
