<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; }
  .rows { display: flex; flex-direction: column; gap: 8px; }
  .r { display: grid; grid-template-columns: 60px 1fr 100px; align-items: center; gap: 14px; }
  .bar { height: 14px; background: var(--dc-yellow); border-radius: 4px; }
  .tok { font-family: var(--ff-mono); font-size: 12px; color: var(--fg-2); }
  .px { font-family: var(--ff-mono); font-size: 12px; color: var(--fg-3); }
</style>
</head><body>
<div class="card">
  <div class="rows">
    <div class="r"><span class="tok">--sp-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
    <div class="r"><span class="tok">--sp-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
    <div class="r"><span class="tok">--sp-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
    <div class="r"><span class="tok">--sp-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
    <div class="r"><span class="tok">--sp-5</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
    <div class="r"><span class="tok">--sp-6</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
    <div class="r"><span class="tok">--sp-7</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
    <div class="r"><span class="tok">--sp-8</span><div class="bar" style="width:64px"></div><span class="px">64 px</span></div>
    <div class="r"><span class="tok">--sp-9</span><div class="bar" style="width:96px"></div><span class="px">96 px</span></div>
    <div class="r"><span class="tok">--sp-10</span><div class="bar" style="width:128px"></div><span class="px">128 px</span></div>
  </div>
</div>
</body></html>
