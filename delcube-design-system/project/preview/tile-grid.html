<!doctype html>
<html><head><meta charset="utf-8"><title>Feature tile grid</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: #fff; }
  .wrap { padding: 24px; background: #1A1A1A; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 120px; gap: 14px; }
  .tile { border-radius: 24px; background: #0A0A0A; overflow: hidden; position: relative; }
  .tile.tall { grid-row: span 2; }
  .tile.light { background: #E7E7E7; }
  .tile.yellow { background: #FFDB00; }
  .tile.img { background: center/cover no-repeat; }
  .label { position: absolute; bottom: 14px; left: 16px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); }
  .light .label, .yellow .label { color: #0A0A0A; }
</style>
</head><body>
<div class="wrap">
  <div class="grid">
    <div class="tile light"><span class="label">Custom Design</span></div>
    <div class="tile"><span class="label">Drops</span></div>
    <div class="tile tall img" style="background-image: url('../assets/product-red-bear.webp');"></div>
    <div class="tile yellow"><span class="label">Community</span></div>
    <div class="tile light"><span class="label">Made in Germany</span></div>
  </div>
</div>
</body></html>
