<!doctype html>
<html><head><meta charset="utf-8"><title>FAQ accordion</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: #fff; }
  .card { padding: 24px; }
  .panel { background: #F4F4F4; border-radius: 20px; padding: 10px 22px; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid #E7E7E7; }
  .row:last-child { border-bottom: 0; }
  .q { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; color: #0A0A0A; }
  .chev { width: 28px; height: 28px; background: #D1D1D1; border-radius: 999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chev svg { width: 12px; height: 12px; }
</style>
</head><body>
<div class="card">
  <div class="panel">
    <div class="row"><span class="q">Wie entstehen eure Produkte?</span><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="#4A4A4A" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
    <div class="row"><span class="q">Wie erhalte ich meine Produkte?</span><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="#4A4A4A" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
    <div class="row"><span class="q">Wie kann ich euch kontaktieren?</span><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="#4A4A4A" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
  </div>
</div>
</body></html>
