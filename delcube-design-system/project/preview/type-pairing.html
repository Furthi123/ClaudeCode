<!doctype html>
<html><head><meta charset="utf-8"><title>Type pairing</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .block { padding: 22px 22px; border: 1px solid var(--border-1); border-radius: 14px; }
  .block.dark { background: #0A0A0A; color: #fff; border-color: #0A0A0A; }
  .l { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; color: rgba(0,0,0,0.55); margin-bottom: 14px; }
  .dark .l { color: rgba(255,255,255,0.55); }
  .display { font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 32px; line-height: 0.95; letter-spacing: -0.035em; }
  .body { font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.55; color: inherit; margin-top: 10px; }
</style>
</head><body>
<div class="card">
  <div class="block">
    <div class="l">DISPLAY · POPPINS BLACK</div>
    <div class="display">Jetzt bist DU dran.</div>
  </div>
  <div class="block dark">
    <div class="l">BODY · DM SANS</div>
    <div class="body">Sende uns deine kreativen Ideen und wir setzen dein Designkonzept in die Tat um. 3D Design · 3D Druck · Nachbearbeitung.</div>
  </div>
</div>
</body></html>
