<!doctype html>
<html><head><meta charset="utf-8"><title>Hero card pattern</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: #fff; }
  .wrap { padding: 24px; }
  .hero { position: relative; border-radius: 28px; overflow: hidden; background: #0A0A0A; min-height: 260px; color: #fff; isolation: isolate; }
  .hero::before { content: ''; position: absolute; right: -80px; top: -40px; width: 360px; height: 360px; background: radial-gradient(circle at center, #FFDB00 0%, rgba(255,219,0,0.6) 30%, rgba(10,10,10,0) 70%); filter: blur(8px); z-index: 0; }
  .hero::after { content: ''; position: absolute; right: 40px; top: 50px; width: 180px; height: 180px; background: url('../assets/logo-black.svg') center/contain no-repeat; filter: invert(1) brightness(0); opacity: 0.92; z-index: 1; }
  .txt { position: relative; z-index: 2; padding: 40px 36px; display: flex; flex-direction: column; justify-content: center; gap: 16px; max-width: 60%; }
  .eb { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; color: #FFDB00; letter-spacing: 0.04em; }
  .t { font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 44px; line-height: 0.95; letter-spacing: -0.035em; color: #fff; }
  .cta { margin-top: 8px; display: inline-flex; align-items: center; align-self: flex-start; padding: 12px 22px; border-radius: 999px; background: #fff; color: #0A0A0A; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; }
</style>
</head><body>
<div class="wrap">
  <div class="hero">
    <div class="txt">
      <span class="eb">NEUE KOLLEKTION</span>
      <div class="t">Echte Produkte.<br>Echte Character.</div>
      <span class="cta">jetzt entdecken</span>
    </div>
  </div>
</div>
</body></html>
